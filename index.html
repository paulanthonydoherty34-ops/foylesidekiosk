<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=2160, initial-scale=1.0">
<title>Foyleside Shopping Centre — Store Directory</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════
   FOYLESIDE SHOPPING CENTRE — TOUCH SCREEN DIRECTORY
   Resolution: 2160 × 3840px portrait (9:16)
   Format: Self-contained H5 / HTML5
   Version: 4.0 FINAL
═══════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --brand:       #293945;
  --brand-dk:    #1b2830;
  --brand-md:    #344d5e;
  --brand-lt:    #4e6a82;
  --gold:        #c9a84c;
  --gold-lt:     #e8c87a;
  --gold-dk:     #a07828;
  --gold-dim:    rgba(201,168,76,0.18);
  --gold-glow:   rgba(201,168,76,0.07);
  --white:       #ffffff;
  --dim:         rgba(255,255,255,0.58);
  --muted:       rgba(255,255,255,0.32);
  --ghost:       rgba(255,255,255,0.08);
  --card:        rgba(255,255,255,0.055);
  --card-b:      rgba(255,255,255,0.09);
  --card-h:      rgba(255,255,255,0.12);
  --overlay-bg:  rgba(18,28,36,0.94);
  --green:       #7edaa0;
  --r-sm: 8px; --r-md: 12px; --r-lg: 16px; --r-xl: 22px;
}

html, body {
  width: 100%; height: 100%;
  background: #0d161e;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; font-family: 'Montserrat', sans-serif;
}

/* ── KIOSK SHELL ─────────────────────────────── */
#kiosk {
  width:  min(100vw, calc(100vh * 9/16));
  height: min(100vh, calc(100vw * 16/9));
  background: var(--brand);
  display: flex; flex-direction: column;
  overflow: hidden; position: relative;
}
#kiosk::before {
  content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 80% 40% at 50% -5%,  rgba(201,168,76,0.13) 0%, transparent 55%),
    radial-gradient(ellipse 50% 60% at 5%  100%, rgba(42,64,90,0.55)   0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 100% 80%, rgba(30,50,68,0.4)    0%, transparent 55%);
}
#kiosk > * { position: relative; z-index: 1; }

/* ── HEADER ──────────────────────────────────── */
.hdr {
  background: rgba(0,0,0,0.30);
  border-bottom: 1px solid rgba(201,168,76,0.22);
  padding: 2.2% 4.5% 1.8%;
  flex-shrink: 0;
}
.hdr-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.6%; }

.logo        { font-size: clamp(20px,3.5vw,52px); font-weight: 900; color: var(--white); letter-spacing: 3px; text-transform: uppercase; line-height: 1; }
.logo-sub    { font-size: clamp(7px,1vw,13px); font-weight: 500; color: var(--gold); letter-spacing: 4px; text-transform: uppercase; margin-top: 4px; }

.hdr-right   { text-align: right; }
#clock       { font-size: clamp(18px,2.8vw,40px); font-weight: 700; color: var(--white); line-height: 1; }
#dateline    { font-size: clamp(7px,0.85vw,11px); color: var(--dim); letter-spacing: 0.5px; margin-top: 4px; }

.search-wrap {
  display: flex; align-items: center; gap: 2%;
  background: rgba(255,255,255,0.07);
  border: 1.5px solid rgba(201,168,76,0.28);
  border-radius: 50px; padding: 1.3% 3%;
  transition: background .2s, border-color .2s;
}
.search-wrap:focus-within { background: rgba(255,255,255,0.11); border-color: rgba(201,168,76,0.5); }
.search-ic   { font-size: clamp(12px,1.6vw,20px); opacity: .65; flex-shrink: 0; }
#searchInput {
  flex: 1; background: transparent; border: none; outline: none;
  font-size: clamp(9px,1.2vw,16px); color: var(--white);
  font-family: 'Montserrat', sans-serif; font-weight: 400; letter-spacing: 0.5px;
}
#searchInput::placeholder { color: rgba(255,255,255,0.38); }
#searchClear {
  display: none; align-items: center; justify-content: center;
  width: clamp(22px,2.4vw,32px); height: clamp(22px,2.4vw,32px);
  background: rgba(255,255,255,0.12); border: none; border-radius: 50%;
  color: var(--white); font-size: clamp(9px,1.1vw,14px);
  cursor: pointer; flex-shrink: 0; font-family: 'Montserrat', sans-serif;
  transition: background .15s;
}
#searchClear.show { display: flex; }
#searchClear:hover { background: rgba(255,255,255,0.22); }

/* ── FLOOR TABS ──────────────────────────────── */
.tabs {
  display: flex;
  background: rgba(0,0,0,0.22);
  border-bottom: 1px solid rgba(255,255,255,0.07);
  flex-shrink: 0; padding: 0 2%;
}
.tab {
  flex: 1; padding: 2.4% 1%; text-align: center; cursor: pointer;
  border-bottom: 3px solid transparent; transition: all .18s;
  color: var(--muted); font-family: 'Montserrat', sans-serif;
}
.tab:hover  { color: rgba(255,255,255,0.75); }
.tab.active { color: var(--gold); border-bottom-color: var(--gold); }
.tab-num    { display: block; font-size: clamp(14px,2.1vw,30px); font-weight: 900; line-height: 1.1; }
.tab-lbl    { font-size: clamp(6px,0.85vw,11px); font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }

/* ── VIEW SWITCHER ───────────────────────────── */

/* ── CATEGORY PILLS ──────────────────────────── */
.pills-wrap {
  display: flex; gap: 1.5%; padding: 1.4% 4.5% 0;
  flex-shrink: 0; overflow-x: auto; scrollbar-width: none;
}
.pills-wrap::-webkit-scrollbar { display: none; }
.pill {
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 30px; padding: 1% 3.5%;
  font-size: clamp(6.5px,0.9vw,12px); font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: var(--dim); cursor: pointer;
  transition: all .15s; white-space: nowrap; font-family: 'Montserrat', sans-serif;
}
.pill:hover  { background: rgba(201,168,76,0.1); border-color: rgba(201,168,76,0.35); color: var(--gold-lt); }
.pill.active { background: rgba(201,168,76,0.17); border-color: var(--gold); color: var(--gold); }

/* ── MAIN SCROLL ─────────────────────────────── */
.main { flex: 1; overflow-y: auto; padding: 2% 4.5% 3%; scrollbar-width: none; }
.main::-webkit-scrollbar { display: none; }

/* ── TYPOGRAPHY ──────────────────────────────── */
.flr-desc {
  font-size: clamp(7px,0.9vw,12px); color: var(--gold-lt);
  letter-spacing: 2px; text-transform: uppercase; font-weight: 600;
  margin-bottom: 2.5%; padding-bottom: 1.8%;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.sec-lbl {
  font-size: clamp(6px,0.82vw,11px); letter-spacing: 2.5px; color: var(--muted);
  text-transform: uppercase; font-weight: 800;
  margin: 2.8% 0 1.4%; padding-bottom: 1%;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

/* ── ANCHOR CARDS ────────────────────────────── */
.anchors { display: grid; grid-template-columns: repeat(3,1fr); gap: 1.8%; margin-bottom: 2.5%; }
.anc-card {
  background: rgba(201,168,76,0.09); border: 1px solid rgba(201,168,76,0.28);
  border-radius: var(--r-md); padding: 3.8% 2.5%; text-align: center;
  cursor: pointer; transition: all .15s;
}
.anc-card:hover, .anc-card:active { background: rgba(201,168,76,0.18); transform: scale(0.98); }
.anc-name { font-size: clamp(8px,1.2vw,16px); font-weight: 800; color: var(--white); }
.anc-tag  { font-size: clamp(6px,0.75vw,10px); color: var(--gold); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 3px; font-weight: 600; }

/* ── STORE GRID ──────────────────────────────── */
.store-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 1.8%; margin-bottom: 1%; }
.s-card {
  background: var(--card); border: 1px solid var(--card-b); border-radius: var(--r-md);
  padding: 3.5% 3%; cursor: pointer; transition: all .15s;
  display: flex; align-items: center; gap: 5%;
}
.s-card:hover, .s-card:active { background: var(--card-h); border-color: rgba(255,255,255,0.2); transform: scale(0.99); }
.s-ic {
  width: clamp(32px,5%,56px); height: clamp(32px,5%,56px);
  border-radius: var(--r-sm); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(13px,1.9vw,26px);
}
.s-info { flex: 1; min-width: 0; }
.s-name { font-size: clamp(8px,1.2vw,16px); font-weight: 700; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.s-unit { font-size: clamp(6.5px,0.85vw,11px); color: var(--dim); margin-top: 2px; }
.badge  { display: inline-block; font-size: clamp(6px,0.65vw,9px); padding: 2px 7px; border-radius: 20px; margin-top: 4px; letter-spacing: 0.5px; font-weight: 800; text-transform: uppercase; }
.b-food   { background: rgba(201,168,76,0.2); color: var(--gold-lt); }
.b-new    { background: rgba(126,218,160,0.18); color: #7edaa0; }
.b-anchor { background: rgba(201,168,76,0.22); color: var(--gold); }

/* ── TOILETS BLOCK ───────────────────────────── */
.toilet-block {
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  border-left: 3px solid rgba(201,168,76,0.5); border-radius: var(--r-sm);
  padding: 2.5% 3%; margin-top: 2.5%;
}
.toilet-ttl   { font-size: clamp(6.5px,0.85vw,11px); font-weight: 800; color: var(--dim); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 1.5%; }
.toilet-items { display: flex; gap: 1.5%; flex-wrap: wrap; }
.toilet-item  { font-size: clamp(7px,0.9vw,12px); color: var(--dim); background: rgba(255,255,255,0.05); border-radius: 20px; padding: 1% 2.5%; white-space: nowrap; }

/* ── FACILITIES GRID ─────────────────────────── */
.facs { display: grid; grid-template-columns: repeat(4,1fr); gap: 1.5%; margin-top: 2%; }
.fac  {
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
  border-radius: var(--r-sm); padding: 3% 1%; text-align: center; cursor: pointer;
  transition: background .15s;
}
.fac:hover, .fac:active { background: rgba(255,255,255,0.1); }
.fac-ic { font-size: clamp(14px,2.2vw,30px); display: block; margin-bottom: 5px; }
.fac-n  { font-size: clamp(5.5px,0.78vw,10px); color: var(--muted); letter-spacing: 0.5px; font-weight: 600; }

/* ── SEARCH RESULTS ──────────────────────────── */
.sr-head    { font-size: clamp(7px,0.9vw,12px); color: var(--gold-lt); letter-spacing: 2px; text-transform: uppercase; font-weight: 700; margin-bottom: 2%; }
.sr-badge   { display: inline-block; font-size: clamp(6px,0.65vw,9px); background: rgba(201,168,76,0.2); color: var(--gold); padding: 2px 7px; border-radius: 20px; font-weight: 800; letter-spacing: 1px; margin-left: 4px; }
.no-results { text-align: center; padding: 10% 5%; font-size: clamp(10px,1.3vw,18px); color: var(--dim); line-height: 1.7; }
.no-results .nr-ic { font-size: clamp(28px,4vw,55px); display: block; margin-bottom: 4%; }

/* ── STORE DETAIL OVERLAY ────────────────────── */
#overlay {
  position: absolute; inset: 0; z-index: 100;
  background: var(--overlay-bg);
  display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none;
  transition: opacity .25s;
}
#overlay.open { opacity: 1; pointer-events: all; }

.det-panel {
  width: 100%; background: var(--brand-dk);
  border-top: 2.5px solid var(--gold);
  border-radius: var(--r-xl) var(--r-xl) 0 0;
  padding: 4% 5% 6%;
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.32,.72,0,1);
  position: relative;
}
#overlay.open .det-panel { transform: translateY(0); }

.det-handle { width: 44px; height: 5px; background: rgba(255,255,255,0.18); border-radius: 3px; margin: 0 auto 4%; }
.det-close  {
  position: absolute; top: 3.5%; right: 4%;
  background: rgba(255,255,255,0.1); border: none; color: var(--white);
  width: clamp(36px,5vw,56px); height: clamp(36px,5vw,56px);
  border-radius: 50%; font-size: clamp(12px,1.6vw,20px); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Montserrat', sans-serif; transition: background .15s;
}
.det-close:hover { background: rgba(255,255,255,0.2); }
.det-ic-wrap {
  width: clamp(50px,8vw,80px); height: clamp(50px,8vw,80px);
  border-radius: var(--r-lg); display: flex; align-items: center; justify-content: center;
  font-size: clamp(22px,3.5vw,40px); margin-bottom: 3%;
}
.det-name  { font-size: clamp(16px,2.2vw,30px); font-weight: 900; color: var(--white); margin-bottom: 1%; }
.det-floor { font-size: clamp(7px,0.9vw,12px); color: var(--gold); letter-spacing: 2px; text-transform: uppercase; font-weight: 700; margin-bottom: 3%; }
.det-rows  { display: grid; gap: 1.5%; }
.det-row   {
  display: flex; align-items: flex-start; gap: 3%;
  background: rgba(255,255,255,0.05); border-radius: var(--r-sm);
  padding: 2.8% 3%;
}
.det-row-ic { font-size: clamp(14px,1.8vw,22px); flex-shrink: 0; width: 1.4em; text-align: center; margin-top: 2px; }
.det-row-tx { font-size: clamp(8px,1.05vw,14px); color: var(--dim); line-height: 1.5; }
.det-row-tx strong { color: var(--white); font-weight: 700; display: block; margin-bottom: 2px; }

/* ── FOOTER ──────────────────────────────────── */
.footer {
  background: rgba(0,0,0,0.32); border-top: 1px solid rgba(201,168,76,0.18);
  padding: 1.8% 4.5%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
}
.yah-btn {
  background: var(--gold); color: var(--brand-dk); border: none;
  border-radius: 30px; padding: 1.5% 4%;
  font-size: clamp(7px,0.95vw,13px); font-weight: 900;
  letter-spacing: 1px; text-transform: uppercase;
  cursor: pointer; font-family: 'Montserrat', sans-serif;
  transition: background .15s;
}
.yah-btn:hover { background: var(--gold-lt); }
.wifi-row { display: flex; align-items: center; gap: 5%; margin-left: 3%; }
.wifi-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; animation: pulse 2.2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
.wifi-txt { font-size: clamp(6px,0.82vw,11px); color: var(--green); font-weight: 700; letter-spacing: 0.5px; }
.ftr-r    { font-size: clamp(5.5px,0.75vw,10px); color: var(--muted); text-align: right; line-height: 1.6; }

/* ── OPENING HOURS BANNER ────────────────────── */
.hours-strip {
  background: rgba(201,168,76,0.08); border: 1px solid rgba(201,168,76,0.18);
  border-radius: var(--r-sm); padding: 1.5% 3%; margin-bottom: 2%;
  display: flex; align-items: center; gap: 2%;
  font-size: clamp(7px,0.9vw,12px); color: var(--dim);
}
.hours-strip strong { color: var(--gold); font-weight: 700; }
</style>
</head>

</div><!-- /kiosk -->

/* ════════════════════════════════
   STATE
════════════════════════════════ */
let AF = 'L2';   // active floor
let AC = 'All';  // active category
let SQ = '';     // search query

/* ════════════════════════════════
   CLOCK
════════════════════════════════ */
function tick() {
  const n = new Date();
  const p = x => String(x).padStart(2,'0');
  document.getElementById('clock').textContent = p(n.getHours())+':'+p(n.getMinutes());
  const days  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months= ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('dateline').textContent = days[n.getDay()]+' '+n.getDate()+' '+months[n.getMonth()]+' '+n.getFullYear();
}
tick(); setInterval(tick, 15000);

/* ════════════════════════════════
   TABS
════════════════════════════════ */
function renderTabs() {
  document.getElementById('tabs').innerHTML = Object.keys(FLOORS).map(k =>
    `<div class="tab${k===AF?' active':''}" onclick="setFloor('${k}')">
       <span class="tab-num">${k}</span>
       <span class="tab-lbl">${FLOORS[k].label}</span>
     </div>`
  ).join('');
}

/* ════════════════════════════════
   PILLS
════════════════════════════════ */
function renderPills() {
  if (SQ) { document.getElementById('pillsWrap').innerHTML=''; return; }
  const cats = Object.keys(FLOORS[AF].cats);
  document.getElementById('pillsWrap').innerHTML =
    `<div class="pill${AC==='All'?' active':''}" onclick="setCat('All')">All</div>` +
    cats.map(c =>
      `<div class="pill${AC===c?' active':''}" onclick="setCat('${c}')">${c}</div>`
    ).join('');
}

/* ════════════════════════════════
   STORE CARD HTML
════════════════════════════════ */
function sCard(s, fk, showFloor) {
  const enc = encodeURIComponent(JSON.stringify(s));
  return `<div class="s-card" onclick="openDetail('${enc}','${fk||AF}')">
    <div class="s-ic" style="background:${s.c}22;color:${s.c}">${s.ic}</div>
    <div class="s-info">
      <div class="s-name">${s.n}</div>
      <div class="s-unit">${s.u}${showFloor?` <span class="sr-badge">${fk}</span>`:''}</div>
      ${s.b?`<span class="badge b-${s.b}">${s.b==='anchor'?'Anchor':s.b==='new'?'New':'Dining'}</span>`:''}
    </div>
  </div>`;
}

/* ════════════════════════════════
   MAIN RENDER
════════════════════════════════ */
function renderMain() {
  if (SQ) { renderSearch(); return; }
  const fl = FLOORS[AF];
  const cats = Object.keys(fl.cats);
  const showCats = AC==='All' ? cats : [AC];
  let h = '';

  h += `<div class="flr-desc">${fl.desc}</div>`;
  h += `<div class="hours-strip">🕐 &nbsp;<strong>Centre hours today:&nbsp;</strong>${fl.hours}</div>`;

  if (fl.anchors.length && AC==='All') {
    h += `<div class="sec-lbl">Anchor stores</div><div class="anchors">`;
    fl.anchors.forEach(a => {
      h += `<div class="anc-card" onclick="openStoreByName('${a}')">
              <div class="anc-name">${a}</div>
              <div class="anc-tag">Anchor</div>
            </div>`;
    });
    h += `</div>`;
  }

  showCats.forEach(cat => {
    h += `<div class="sec-lbl">${cat}</div><div class="store-grid">`;
    fl.cats[cat].forEach(s => { h += sCard(s, AF, false); });
    h += `</div>`;
  });

  if (AC==='All' && fl.toilets) {
    h += `<div class="toilet-block">
      <div class="toilet-ttl">${fl.toilets.title}</div>
      <div class="toilet-items">${fl.toilets.items.map(i=>`<div class="toilet-item">${i}</div>`).join('')}</div>
    </div>`;

  if (AC==='All') {
    h += `<div class="sec-lbl" style="margin-top:3%">Centre facilities</div>

      <div class="fac"><span class="fac-ic">🚗</span><span class="fac-n">Car Valet</span></div>

  document.getElementById('main').innerHTML = h;
}

/* ════════════════════════════════
   SEARCH
════════════════════════════════ */
function renderSearch() {
  const q = SQ.toLowerCase().trim();
  if (!q) { clearSearch(); return; }
  const results = [];
  Object.entries(FLOORS).forEach(([fk, fv]) => {
    Object.values(fv.cats).flat().forEach(s => {
      if (
        s.n.toLowerCase().includes(q) ||
        (s.desc && s.desc.toLowerCase().includes(q)) ||
        (s.u && s.u.toLowerCase().includes(q)) ||
        fv.label.toLowerCase().includes(q)
      ) {
        results.push({...s, _fk: fk});
      }
    });
  });

  let h = `<div class="sr-head">${results.length} result${results.length!==1?'s':''} for "${SQ}"</div>`;
  if (!results.length) {
    h += `<div class="no-results">
      <span class="nr-ic">🔍</span>
      No stores found for "<strong>${SQ}</strong>".<br>
      Try searching by store name,<br>category or floor.
    </div>`;
  } else {
    h += `<div class="store-grid">`;
    results.forEach(s => { h += sCard(s, s._fk, true); });
    h += `</div>`;
  }
  document.getElementById('main').innerHTML = h;
}

function clearSearch() {
  SQ = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').classList.remove('show');
  renderPills();
  renderMain();
}

document.getElementById('searchInput').addEventListener('input', function() {
  SQ = this.value.trim();
  document.getElementById('searchClear').classList.toggle('show', !!SQ);
  renderPills();
  renderMain();
  document.getElementById('main').scrollTop = 0;
});

/* ════════════════════════════════
   DETAIL OVERLAY
════════════════════════════════ */
function openDetail(enc, fk) {
  const s  = JSON.parse(decodeURIComponent(enc));
  const fl = FLOORS[fk];
  document.getElementById('detContent').innerHTML = `
    <div class="det-ic-wrap" style="background:${s.c}22;color:${s.c}">${s.ic}</div>
    <div class="det-name">${s.n}</div>
    <div class="det-floor">${fl ? fl.label : fk} &nbsp;·&nbsp; ${s.u}</div>
    <div class="det-rows">
      ${s.desc ? `<div class="det-row">
        <span class="det-row-ic">📝</span>
        <span class="det-row-tx">${s.desc}</span>
      </div>` : ''}
      ${s.hours ? `<div class="det-row">
        <span class="det-row-ic">🕐</span>
        <span class="det-row-tx"><strong>Opening hours</strong>${s.hours}</span>
      </div>` : `<div class="det-row">
        <span class="det-row-ic">🕐</span>
        <span class="det-row-tx"><strong>Opening hours</strong>${fl ? fl.hours : 'See centre hours'}</span>
      </div>`}
      <div class="det-row">
        <span class="det-row-ic">📍</span>
        <span class="det-row-tx"><strong>Location</strong>${fl ? fl.label : fk} — ${s.u}</span>
      </div>
      ${s.b==='food' ? `<div class="det-row">
        <span class="det-row-ic">🍽</span>
        <span class="det-row-tx">Dining venue — food and drink available</span>
      </div>` : ''}
      ${s.b==='new' ? `<div class="det-row">
        <span class="det-row-ic">🆕</span>
        <span class="det-row-tx">Recently opened at Foyleside Shopping Centre</span>
      </div>` : ''}
    </div>`;
  document.getElementById('overlay').classList.add('open');
}

function openStoreByName(name) {
  let found = null, fk = null;
  Object.entries(FLOORS).forEach(([k,f]) => {
    Object.values(f.cats).flat().forEach(s => { if (s.n===name) { found=s; fk=k; } });
  });
  if (found) openDetail(encodeURIComponent(JSON.stringify(found)), fk);
}

function closeDetail() {
  document.getElementById('overlay').classList.remove('open');
}
function overlayBgClick(e) {
  if (e.target === document.getElementById('overlay')) closeDetail();
}

/* ════════════════════════════════
   VIEW / FLOOR / CAT SWITCHING
════════════════════════════════ */
function setFloor(f) {
  AF = f; AC = 'All';
  renderTabs(); renderPills(); renderMain();
  document.getElementById('main').scrollTop = 0;
}
function setCat(c) {
  AC = c;
  renderPills(); renderMain();
  document.getElementById('main').scrollTop = 0;
}

/* ════════════════════════════════
   IDLE RESET — 3 minutes
════════════════════════════════ */
let idleT;
function resetIdle() {
  clearTimeout(idleT);
  idleT = setTimeout(() => {
    clearSearch();
    setFloor('L2');
    closeDetail();
  }, 180000);
}
document.getElementById('kiosk').addEventListener('touchstart', resetIdle, {passive:true});
document.getElementById('kiosk').addEventListener('mousedown',  resetIdle);
resetIdle();

/* ════════════════════════════════
   INIT
════════════════════════════════ */
renderTabs();
renderPills();
renderMain();
