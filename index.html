<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foyleside Shopping Centre</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg:        #f2efe9;
  --bg-white:  #ffffff;
  --bg-soft:   #e8e4dc;
  --brand:     #293945;
  --brand-lt:  #3a5068;
  --gold:      #b8952a;
  --gold-lt:   #d4af45;
  --gold-bg:   rgba(184,149,42,0.1);
  --gold-bdr:  rgba(184,149,42,0.3);
  --text:      #1a2530;
  --text-mid:  #3d4f5c;
  --text-dim:  #6b7e8c;
  --text-muted:#9aacb8;
  --border:    rgba(41,57,69,0.12);
  --border-md: rgba(41,57,69,0.2);
  --shadow-sm: 0 1px 4px rgba(0,0,0,0.07);
  --shadow-md: 0 4px 18px rgba(0,0,0,0.11);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.17);
  --green:     #166534;
  --green-bg:  #dcfce7;
  --orange:    #92400e;
  --orange-bg: #fff3cd;
  --blue:      #0369a1;
  --blue-bg:   #e0f2fe;
  --radius:    12px;
}

html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Montserrat',sans-serif; color:var(--text); }
#app { width:100vw; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

/* ── HEADER ── */
.hdr { flex-shrink:0; background:var(--brand); padding:14px 20px 12px; position:relative; }
.hdr::after { content:''; position:absolute; bottom:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--gold),var(--gold-lt),var(--gold)); }
.hdr-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:12px; }
.logo { font-size:clamp(24px,5.5vw,44px); font-weight:900; color:#fff; letter-spacing:3px; text-transform:uppercase; line-height:1; }
.logo-sub { font-size:clamp(8px,1.5vw,12px); font-weight:600; color:var(--gold-lt); letter-spacing:4px; text-transform:uppercase; margin-top:3px; }
.hdr-right { text-align:right; }
#clock { font-size:clamp(20px,4vw,34px); font-weight:700; color:#fff; line-height:1; }
#dateline { font-size:clamp(8px,1.3vw,11px); color:rgba(255,255,255,0.6); margin-top:3px; }
.search-wrap { display:flex; align-items:center; gap:10px; background:rgba(255,255,255,0.14); border:1.5px solid rgba(255,255,255,0.22); border-radius:40px; padding:9px 16px; transition:all .2s; }
.search-wrap:focus-within { background:rgba(255,255,255,0.2); border-color:var(--gold-lt); }
.search-ic { font-size:clamp(13px,2vw,18px); opacity:.65; color:#fff; flex-shrink:0; }
#searchInput { flex:1; background:transparent; border:none; outline:none; font-size:clamp(11px,1.8vw,15px); color:#fff; font-family:'Montserrat',sans-serif; font-weight:500; }
#searchInput::placeholder { color:rgba(255,255,255,0.45); }
#clearBtn { display:none; background:rgba(255,255,255,0.2); border:none; color:#fff; border-radius:50%; width:24px; height:24px; font-size:12px; cursor:pointer; align-items:center; justify-content:center; font-family:'Montserrat',sans-serif; }
#clearBtn.show { display:flex; }

/* ── FLOOR TABS ── */
.floor-tabs { flex-shrink:0; display:flex; background:var(--bg-white); border-bottom:1px solid var(--border); box-shadow:var(--shadow-sm); }
.ftab { flex:1; text-align:center; padding:10px 4px; cursor:pointer; border-bottom:3px solid transparent; transition:all .15s; color:var(--text-dim); font-family:'Montserrat',sans-serif; }
.ftab:hover { color:var(--brand); background:var(--bg-soft); }
.ftab.active { color:var(--brand); border-bottom-color:var(--gold); }
.ftab-num { display:block; font-size:clamp(15px,3vw,26px); font-weight:900; line-height:1.1; }
.ftab-lbl { font-size:clamp(7px,1.2vw,10px); font-weight:700; letter-spacing:1.5px; text-transform:uppercase; }

/* ── PILLS ── */
.pills-row { flex-shrink:0; display:flex; gap:6px; padding:9px 16px; overflow-x:auto; scrollbar-width:none; background:var(--bg-white); border-bottom:1px solid var(--border); }
.pills-row::-webkit-scrollbar { display:none; }
.pill { background:rgba(41,57,69,0.07); border:1px solid var(--border-md); border-radius:30px; padding:5px 13px; font-size:clamp(9px,1.4vw,11px); font-weight:700; letter-spacing:.8px; text-transform:uppercase; color:var(--text-mid); cursor:pointer; white-space:nowrap; transition:all .15s; font-family:'Montserrat',sans-serif; }
.pill:hover, .pill.active { background:var(--brand); color:#fff; border-color:var(--brand); }

/* ── MAIN ── */
.main { flex:1; overflow-y:auto; padding:12px 14px 16px; scrollbar-width:thin; scrollbar-color:var(--border-md) transparent; }
.main::-webkit-scrollbar { width:4px; }
.main::-webkit-scrollbar-thumb { background:var(--border-md); border-radius:2px; }

/* ── FLOOR INFO ── */
.floor-info { background:var(--brand); border-radius:var(--radius); padding:9px 13px; margin-bottom:10px; }
.floor-desc { font-size:clamp(8px,1.3vw,11px); font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--gold-lt); margin-bottom:4px; }
.hours-row { display:flex; align-items:center; gap:6px; font-size:clamp(8px,1.2vw,11px); color:rgba(255,255,255,0.7); }
.hours-row strong { color:#fff; font-weight:700; }

/* ── SECTION LABEL ── */
.sec-label { font-size:clamp(8px,1.1vw,10px); letter-spacing:2.5px; color:var(--text-dim); text-transform:uppercase; font-weight:800; margin:15px 0 8px; padding-bottom:6px; border-bottom:1.5px solid var(--border); }

/* ── STORE GRID ── */
.store-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-bottom:4px; }
.store-card { background:var(--bg-white); border:1px solid var(--border); border-radius:var(--radius); padding:10px; cursor:pointer; transition:all .15s; box-shadow:var(--shadow-sm); display:flex; align-items:center; gap:10px; }
.store-card:hover, .store-card:active { border-color:var(--brand); box-shadow:var(--shadow-md); transform:scale(0.99); }

/* Logo */

.store-info { flex:1; min-width:0; }
.store-name { font-size:clamp(10px,1.6vw,13px); font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.store-cats { display:flex; gap:4px; flex-wrap:wrap; margin-top:3px; }
.store-cat { font-size:clamp(7px,1vw,9px); color:var(--text-dim); background:var(--bg-soft); border-radius:20px; padding:2px 7px; font-weight:600; white-space:nowrap; }
.store-badges { display:flex; gap:3px; flex-wrap:wrap; margin-top:4px; }
.badge { display:inline-block; font-size:clamp(7px,.95vw,9px); padding:2px 7px; border-radius:20px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; }
.b-food    { background:var(--orange-bg); color:var(--orange); }
.b-drinks  { background:#e8f4ff; color:#0369a1; }
.b-toilets { background:var(--blue-bg); color:var(--blue); }
.b-floor   { background:rgba(41,57,69,0.1); color:var(--brand); }
.b-coming  { background:#f3e8ff; color:#7c3aed; }
.store-arrow { color:var(--text-muted); flex-shrink:0; font-size:14px; }

/* ── TOILET BLOCK ── */
.toilet-block { background:var(--bg-white); border:1px solid var(--border); border-left:3px solid var(--gold); border-radius:var(--radius); padding:12px 14px; margin:10px 0; box-shadow:var(--shadow-sm); }
.toilet-title { font-size:clamp(10px,1.5vw,13px); font-weight:800; color:var(--text); letter-spacing:1px; text-transform:uppercase; margin-bottom:9px; }
.toilet-items { display:flex; gap:6px; flex-wrap:wrap; }
.toilet-item { font-size:clamp(11px,1.6vw,14px); color:var(--text-mid); background:var(--bg-soft); border-radius:20px; padding:5px 13px; font-weight:600; }

/* ── FACILITIES GRID ── (plain icon buttons) */
.fac-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:10px; }
.fac-btn {
  background:var(--brand);
  border:none;
  border-radius:var(--radius); padding:10px 5px; text-align:center;
  cursor:pointer; transition:all .15s; box-shadow:var(--shadow-sm);
  display:flex; flex-direction:column; align-items:center; gap:6px;
}
.fac-btn:hover, .fac-btn:active { background:#1a2730; transform:scale(0.97); }
.fac-icon-wrap { width:44px; height:44px; display:flex; align-items:center; justify-content:center; }
.fac-icon-wrap svg { width:28px; height:28px; overflow:visible; }
.fac-name { font-size:clamp(7px,1vw,9px); color:rgba(255,255,255,0.85); font-weight:700; letter-spacing:.3px; }

/* ── CS CARD ── */
.cs-card { background:var(--brand); border-radius:var(--radius); padding:13px; margin-bottom:12px; box-shadow:var(--shadow-md); }
.cs-header { display:flex; align-items:center; gap:11px; margin-bottom:11px; }
.cs-icon-box { width:42px; height:42px; border-radius:10px; background:var(--gold); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.cs-icon-box svg { width:20px; height:20px; flex-shrink:0; stroke:#fff; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
.cs-title { font-size:clamp(13px,2vw,16px); font-weight:800; color:#fff; }
.cs-loc   { font-size:clamp(8px,1.2vw,10px); color:var(--gold-lt); font-weight:600; margin-top:2px; }
.cs-grid  { display:grid; grid-template-columns:repeat(2,1fr); gap:5px; }
.cs-item  { background:rgba(255,255,255,0.1); border-radius:8px; padding:7px 9px; display:flex; align-items:center; gap:7px; }
.cs-item svg { width:14px; height:14px; stroke:#fff; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; }
.cs-item-name { font-size:clamp(8px,1.3vw,11px); color:#fff; font-weight:600; }

/* ── SEARCH ── */
.sr-heading { font-size:clamp(8px,1.3vw,11px); color:var(--text-dim); letter-spacing:2px; text-transform:uppercase; font-weight:800; margin-bottom:11px; }
.no-results { text-align:center; padding:50px 20px; }
.nr-icon { font-size:clamp(30px,5vw,46px); display:block; margin-bottom:12px; }
.no-results p { font-size:clamp(11px,1.8vw,15px); color:var(--text-dim); }

/* ── FOOTER ── */
.footer { flex-shrink:0; background:var(--brand); border-top:3px solid var(--gold); padding:10px 20px; display:flex; align-items:center; justify-content:space-between; }
.footer-left { display:flex; align-items:center; gap:14px; }
.yah-pill { display:flex; align-items:center; gap:6px; background:var(--gold); color:var(--brand); border-radius:30px; padding:7px 16px; font-size:clamp(8px,1.3vw,11px); font-weight:900; letter-spacing:1px; text-transform:uppercase; }
.wifi-row { display:flex; align-items:center; gap:6px; }
.wifi-dot { width:7px; height:7px; border-radius:50%; background:#4ade80; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.35;} }
.wifi-txt { font-size:clamp(8px,1.2vw,11px); color:#4ade80; font-weight:700; }
.footer-right { font-size:clamp(7px,1.1vw,10px); color:rgba(255,255,255,0.5); text-align:right; line-height:1.6; }

/* ── MODAL ── */
#modal-backdrop { position:fixed; inset:0; z-index:200; background:rgba(20,32,42,0.72); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; padding:20px; opacity:0; pointer-events:none; transition:opacity .22s; }
#modal-backdrop.open { opacity:1; pointer-events:all; }
.modal-box { background:var(--bg-white); border-radius:20px; width:100%; max-width:500px; box-shadow:var(--shadow-lg); border-top:4px solid var(--gold); padding:26px 26px 24px; transform:scale(.93); transition:transform .25s cubic-bezier(.32,.72,0,1); position:relative; max-height:85vh; overflow-y:auto; scrollbar-width:none; }
.modal-box::-webkit-scrollbar { display:none; }
#modal-backdrop.open .modal-box { transform:scale(1); }
.modal-close { position:absolute; top:14px; right:14px; background:var(--bg-soft); border:none; color:var(--text-dim); width:32px; height:32px; border-radius:50%; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-family:'Montserrat',sans-serif; transition:background .15s; }
.modal-close:hover { background:var(--border-md); }

/* Modal logo */

/* BIG store name */
.modal-store-name { font-size:clamp(22px,4vw,32px); font-weight:900; color:var(--text); margin-bottom:4px; letter-spacing:-.5px; line-height:1.1; }
.modal-level-tag { display:inline-block; background:var(--brand); color:#fff; border-radius:20px; padding:4px 14px; font-size:clamp(9px,1.4vw,11px); font-weight:700; letter-spacing:2px; text-transform:uppercase; margin-bottom:18px; }

.modal-rows { display:flex; flex-direction:column; gap:7px; }
.modal-row { display:flex; align-items:flex-start; gap:12px; background:var(--bg-soft); border-radius:10px; padding:12px 13px; }
.modal-row-icon { display:flex; align-items:center; justify-content:center; width:22px; height:22px; flex-shrink:0; margin-top:1px; overflow:hidden; }
.modal-row-icon svg { width:16px; height:16px; stroke:var(--brand); fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
.modal-row-text { font-size:clamp(10px,1.5vw,13px); color:var(--text-mid); line-height:1.55; }
.modal-row-text strong { color:var(--text); font-weight:700; display:block; margin-bottom:2px; }
.modal-cat-row { display:flex; gap:5px; flex-wrap:wrap; margin-top:6px; }
.modal-cat { font-size:clamp(8px,1.1vw,10px); background:var(--bg-white); border:1px solid var(--border-md); border-radius:20px; padding:3px 9px; color:var(--text-dim); font-weight:600; }
.modal-flag { display:flex; align-items:center; gap:8px; padding:9px 12px; border-radius:8px; font-size:clamp(9px,1.3vw,11px); font-weight:600; margin-top:2px; }
.modal-flag svg { width:15px; height:15px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; }
.mf-food    { background:var(--orange-bg); color:var(--orange); }
.mf-drinks  { background:#e8f4ff; color:#0369a1; }
.mf-toilets { background:var(--blue-bg); color:var(--blue); }
.mf-coming  { background:#f3e8ff; color:#7c3aed; }

/* Fac modal */
.fac-modal-list { display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-top:4px; }
.fac-modal-item { background:var(--bg-soft); border-radius:9px; padding:10px 12px; font-size:clamp(10px,1.5vw,13px); color:var(--text-mid); font-weight:600; display:flex; align-items:center; gap:8px; }
.fac-modal-item svg { width:15px; height:15px; stroke:var(--brand); fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; }

</style>
</head>
<body>
<div id="app">

  <div class="hdr">
    <div class="hdr-top">
      <div>
        <div class="logo">Foyleside</div>
        <div class="logo-sub" style="margin-top:5px;">Shopping Centre · Derry</div>
      </div>
      <div class="hdr-right">
        <div id="clock">--:--</div>
        <div id="dateline"></div>
      </div>
    </div>
    <div class="search-wrap">
      <span class="search-ic">⌕</span>
      <input id="searchInput" type="text" autocomplete="off" spellcheck="false" placeholder="Search stores, restaurants, services…">
      <button id="clearBtn" onclick="clearSearch()">✕</button>
    </div>
  </div>

  <div class="floor-tabs" id="floorTabs"></div>
  <div class="pills-row" id="pillsRow"></div>
  <div class="main" id="main"></div>

  <div class="footer">
    <div class="footer-left">
      <div class="yah-pill">YOU ARE ON LEVEL 3</div>
      <div class="wifi-row"><div class="wifi-dot"></div><span class="wifi-txt">Free WiFi</span></div>
    </div>
    <div class="footer-right">Touch screen to explore<br>19 Orchard Street, Derry BT48 6XY<br>Tel: 028 7137 7575</div>
  </div>

  <div id="modal-backdrop" onclick="backdropClick(event)">
    <div class="modal-box">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div id="modalContent"></div>
    </div>
  </div>

</div>

let AF = 'L2', AC = 'All', SQ = '';

/* ══════════════
   CLOCK
══════════════ */
function tick() {
  const n = new Date();
  const p = x => String(x).padStart(2,'0');
  document.getElementById('clock').textContent = p(n.getHours())+':'+p(n.getMinutes());
  const dy=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const mo=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('dateline').textContent = dy[n.getDay()]+' '+n.getDate()+' '+mo[n.getMonth()]+' '+n.getFullYear();
}
tick(); setInterval(tick,10000);

/* ══════════════
   LOGO HTML
══════════════ */
function brandTile(name, size) {
  const bg = '#293945';
  const fg = '#ffffff';
  const LABELS = {
    'Marks & Spencer':'M&S','Edinburgh Woollen Mill':'EWM',
    'BPerfect Cosmetics':'BPerfect','The Body Shop':'Body Shop',
    'The Perfume Shop':'Perfume Shop','Holland & Barrett':'H&B',
    'Clarks Shoes':'Clarks','Costa Coffee':'Costa',
    'Starbucks Coffee':'Starbucks','Bureau de Change':'BdC',
    'Lottery Kiosk':'Lottery','Hays Travel':'Hays Travel',
    'Vision Express':'Vision Exp','Card Factory':'Card Factory',
    'Yankee Candle':'Yankee','Nova Nails':'Nova Nails',
    'The Barber':'The Barber',
    'West Car Park':'WCP',
    'East Car Park':'ECP','Dunnes Café':'Dunnes',
    'Three Mobile':'3','Hey Boba.':'Hey Boba',
    'All Sweet Hi':'All Sweet','Office Shoes':'Office',
    'Angry Cherry':'Angry Cherry','SC Beauty':'SC Beauty',
    'H. Samuel':'H.Samuel','Real Image':'Real Image',
  };
  const label = LABELS[name] || name;
  const len = label.length;
  let fs, extra;
  if (size === 'modal') {
    fs = len<=3?'22px':len<=5?'17px':len<=8?'13px':len<=12?'11px':'9px';
    extra = 'width:72px;height:72px;border-radius:14px;margin-bottom:14px;';
  } else {
    fs = len<=3?'clamp(11px,1.8vw,15px)':len<=5?'clamp(9px,1.4vw,12px)':len<=8?'clamp(7px,1.1vw,10px)':len<=12?'clamp(6px,0.95vw,9px)':'clamp(5px,0.8vw,7.5px)';
    extra = 'width:clamp(38px,6.5vw,52px);height:clamp(38px,6.5vw,52px);border-radius:10px;flex-shrink:0;';
  }
  const lh = label.includes(' ') ? '1.1' : '1';
  return '<div style="'+extra+'background:'+bg+';color:'+fg+';display:flex;align-items:center;justify-content:center;font-family:Montserrat,sans-serif;font-size:'+fs+';font-weight:900;text-align:center;line-height:'+lh+';letter-spacing:-0.2px;padding:4px;border:1.5px solid rgba(0,0,0,0.1);">'+label+'</div>';
}

/* ══════════════
   STORE CARD
══════════════ */
function storeCardHTML(s, fk, showFloor) {
  const enc = encodeURIComponent(JSON.stringify({...s, _fk:fk||AF}));
  const catList = (s.cats||[]).slice(0,2).map(c=>`<span class="store-cat">${c}</span>`).join('');
  const badges = [
    s.coming  ? `<span class="badge b-coming">Coming 2026</span>` : '',
    s.food    ? `<span class="badge b-food">Dining</span>` : '',
    s.drinks  ? `<span class="badge b-drinks">Drinks</span>` : '',
    s.toilets ? `<span class="badge b-toilets">Toilets</span>` : '',
    showFloor ? `<span class="badge b-floor">L${(fk||AF).replace('L','')}</span>` : '',
  ].filter(Boolean).join('');
  return `<div class="store-card" onclick="openModal('${enc}')">
    ${brandTile(s.n,'card')}
    <div class="store-info">
      <div class="store-name">${s.n}</div>
      <div class="store-cats">${catList}</div>
      ${badges?`<div class="store-badges">${badges}</div>`:''}
    </div>
    <span class="store-arrow">›</span>
  </div>`;
}

        <div class="cs-item">${IC.info}<span class="cs-item-name">General Queries</span></div>
        <div class="cs-item">${IC.access}<span class="cs-item-name">Shopmobility</span></div>
        <div class="cs-item">${IC.info}<span class="cs-item-name">Information</span></div>
        <div class="cs-item">${IC.access}<span class="cs-item-name">Accessibility</span></div>
      </div>
    </div>`;
  }

  // Toilet block
  if (fl.toilets && AC==='All') {
    h += `<div class="toilet-block">
      <div class="toilet-title">${fl.toilets.title}</div>
      <div class="toilet-items">${fl.toilets.items.map(i=>`<div class="toilet-item">${i}</div>`).join('')}</div>
    </div>`;
  }
  if (fl.toiletNote && AC==='All') {
    h += `<div class="toilet-block">
      <div class="toilet-title">Toilets — ${fl.label}</div>
      <div class="toilet-items"><div class="toilet-item">${fl.toiletNote}</div></div>
    </div>`;
  }

  // Stores
  showCats.forEach(cat => {
    h += `<div class="sec-label">${cat}</div><div class="store-grid">`;
    fl.cats[cat].forEach(s => { h += storeCardHTML(s,AF,false); });
    h += `</div>`;
  });

  // Facilities
  if (AC==='All') {
    h += `<div class="sec-label" style="margin-top:16px">Centre Facilities</div>
    <div class="fac-grid">`;
    Object.entries(FAC_DATA).forEach(([name, fd]) => {
      h += `<div class="fac-btn" onclick="openFacModal('${name}')">
        <div class="fac-icon-wrap">${fd.icon}</div>
        <span class="fac-name">${name}</span>
      </div>`;
    });
    h += `</div>`;
  }

  document.getElementById('main').innerHTML = h;
  document.getElementById('main').scrollTop = 0;
}

/* ══════════════
   SEARCH
══════════════ */
function renderSearch() {
  const q = SQ.toLowerCase().trim();
  const results = [];
  Object.entries(FLOORS).forEach(([fk,fv]) => {
    Object.values(fv.cats).flat().forEach(s => {
      if (s.n.toLowerCase().includes(q) ||
          (s.desc && s.desc.toLowerCase().includes(q)) ||
          (s.cats && s.cats.some(c=>c.toLowerCase().includes(q)))) {
        results.push({...s, _fk:fk});
      }
    });
  });
  let h = `<div class="sr-heading">${results.length} result${results.length!==1?'s':''} for "${SQ}"</div>`;
  if (!results.length) {
    h += `<div class="no-results"><span class="nr-icon">🔍</span><p>No stores found for "<strong>${SQ}</strong>"</p></div>`;
  } else {
    h += `<div class="store-grid">`;
    results.forEach(s => { h += storeCardHTML(s,s._fk,true); });
    h += `</div>`;
  }
  document.getElementById('main').innerHTML = h;
  document.getElementById('main').scrollTop = 0;
}

function clearSearch() {
  SQ='';
  document.getElementById('searchInput').value='';
  document.getElementById('clearBtn').classList.remove('show');
  renderPills(); renderMain();
}
document.getElementById('searchInput').addEventListener('input', function() {
  SQ=this.value.trim();
  document.getElementById('clearBtn').classList.toggle('show',!!SQ);
  renderPills(); renderMain();
});

/* ══════════════
   MODAL — store
══════════════ */
function openModal(enc) {
  const s  = JSON.parse(decodeURIComponent(enc));
  const fl = FLOORS[s._fk];
  const allCats = (s.cats||[]).map(c=>`<span class="modal-cat">${c}</span>`).join('');

  document.getElementById('modalContent').innerHTML = `
    ${brandTile(s.n,'modal')}
    <div class="modal-store-name">${s.n}</div>
    <div class="modal-level-tag">${fl?fl.label:s._fk}</div>
    <div class="modal-rows">
      ${s.desc?`<div class="modal-row">
        <span class="modal-row-icon">${IC.tag}</span>
        <span class="modal-row-text">${s.desc}${allCats?`<div class="modal-cat-row">${allCats}</div>`:''}</span>
      </div>`:''}
      <div class="modal-row">
        <span class="modal-row-icon">${IC.clock}</span>
        <span class="modal-row-text"><strong>Opening Hours</strong>${s.hours||(fl?fl.hours:'See centre hours')}</span>
      </div>
      <div class="modal-row">
        <span class="modal-row-icon">${IC.map}</span>
        <span class="modal-row-text"><strong>Location</strong>${fl?fl.label:s._fk}</span>
      </div>
      ${s.food    ?`<div class="modal-flag mf-food"><svg viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"/></svg> Dining venue — food and drink available</div>` :''}
      ${s.drinks  ?`<div class="modal-flag mf-drinks"><svg viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2h8l-1 7H9L8 2z"/><path d="M9 9c0 5 3 8 3 8s3-3 3-8"/><path d="M6 20h12"/></svg> Drinks venue</div>` :''}
      ${s.toilets ?`<div class="modal-flag mf-toilets">${IC.toilet} Toilet facilities available inside</div>` :''}
      ${s.coming  ?`<div class="modal-flag mf-coming"><svg viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Coming to Foyleside in 2026</div>` :''}
    </div>`;
  document.getElementById('modal-backdrop').classList.add('open');
}

/* ══════════════
   MODAL — facility
══════════════ */
function openFacModal(name) {
  const fd = FAC_DATA[name];
  if (!fd) return;
  // Scale up the icon SVG for modal display by replacing its width/height
  const bigIcon = fd.icon
    .replace(/width="[\d]+"/, 'width="36"')
    .replace(/height="[\d]+"/, 'height="36"');
  const itemsHTML = fd.items.map(i =>
    `<div class="fac-modal-item">${fd.icon}<span>${i}</span></div>`
  ).join('');
  document.getElementById('modalContent').innerHTML = `
    <div style="width:70px;height:70px;border-radius:14px;background:var(--brand);display:flex;align-items:center;justify-content:center;margin-bottom:14px;">
      ${bigIcon}
    </div>
    <div class="modal-store-name">${name}</div>
    <div class="modal-level-tag">Foyleside Shopping Centre</div>
    <div class="modal-rows">
      <div class="fac-modal-list">${itemsHTML}</div>
    </div>`;
  document.getElementById('modal-backdrop').classList.add('open');
}

function closeModal() { document.getElementById('modal-backdrop').classList.remove('open'); }
function backdropClick(e) { if(e.target===document.getElementById('modal-backdrop')) closeModal(); }

/* ══════════════
   SWITCHING + IDLE
══════════════ */
function setFloor(f) { AF=f; AC='All'; renderTabs(); renderPills(); renderMain(); }
function setCat(c)   { AC=c; renderPills(); renderMain(); }

let idleT;
function resetIdle() {
  clearTimeout(idleT);
  idleT = setTimeout(()=>{ clearSearch(); setFloor('L2'); closeModal(); }, 180000);
}
document.getElementById('app').addEventListener('touchstart', resetIdle, {passive:true});
document.getElementById('app').addEventListener('mousedown', resetIdle);
resetIdle();

renderTabs(); renderPills(); renderMain();
</script>
</body>
</html>
