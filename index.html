<style>
/* ═══════════════════════════════════════════
   FOYLESIDE DIRECTORY EDITOR
   Left: Edit panel  |  Right: Live kiosk preview
═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --brand: #293945; --brand-dk: #1b2830; --brand-md: #344d5e;
  --gold: #c9a84c; --gold-lt: #e8c87a;
  --white: #fff; --dim: rgba(255,255,255,0.58); --muted: rgba(255,255,255,0.32);
  --card: rgba(255,255,255,0.055); --card-b: rgba(255,255,255,0.09);
  --green: #7edaa0;
  /* editor palette */
  --e-bg: #111820; --e-panel: #1a2530; --e-card: #212f3c;
  --e-border: rgba(255,255,255,0.1); --e-input: #293645;
  --e-gold: #c9a84c; --e-text: #e8edf2; --e-dim: rgba(232,237,242,0.55);
  --e-danger: #e05252; --e-success: #5dba7e; --e-info: #5a9ed4;
}
html, body { width:100%; height:100%; background:var(--e-bg); font-family:'Montserrat',sans-serif; overflow:hidden; color:var(--e-text); }

/* ── LAYOUT ── */
.layout { display:grid; grid-template-columns:480px 1fr; height:100vh; overflow:hidden; }

/* ══════════════════════════════
   LEFT — EDITOR PANEL
══════════════════════════════ */
.editor { background:var(--e-panel); border-right:1px solid var(--e-border); display:flex; flex-direction:column; overflow:hidden; }

/* Editor header */
.ed-hdr { padding:16px 20px; border-bottom:1px solid var(--e-border); background:rgba(0,0,0,0.25); flex-shrink:0; }
.ed-hdr-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.ed-title { font-size:16px; font-weight:800; color:var(--e-gold); letter-spacing:1px; text-transform:uppercase; }
.ed-subtitle { font-size:10px; color:var(--e-dim); letter-spacing:1px; margin-top:2px; }

/* Export button */
.export-btn { background:var(--e-gold); color:var(--brand-dk); border:none; border-radius:8px; padding:8px 16px; font-size:11px; font-weight:800; letter-spacing:1px; text-transform:uppercase; cursor:pointer; font-family:'Montserrat',sans-serif; transition:background .15s; }
.export-btn:hover { background:var(--gold-lt); }

/* Floor selector tabs in editor */
.ed-floor-tabs { display:flex; gap:4px; }
.ed-ftab { flex:1; padding:7px 4px; text-align:center; background:rgba(255,255,255,0.05); border:1px solid var(--e-border); border-radius:6px; cursor:pointer; font-size:10px; font-weight:700; letter-spacing:1px; color:var(--e-dim); transition:all .15s; font-family:'Montserrat',sans-serif; }
.ed-ftab:hover { background:rgba(255,255,255,0.1); }
.ed-ftab.active { background:rgba(201,168,76,0.18); border-color:var(--e-gold); color:var(--e-gold); }

/* Editor scroll body */
.ed-body { flex:1; overflow-y:auto; padding:12px 16px 80px; scrollbar-width:thin; scrollbar-color:rgba(255,255,255,0.15) transparent; }
.ed-body::-webkit-scrollbar { width:5px; }
.ed-body::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.15); border-radius:3px; }

/* Section heading in editor */
.ed-sec { font-size:9px; font-weight:800; color:var(--e-dim); letter-spacing:2px; text-transform:uppercase; margin:16px 0 8px; padding-bottom:6px; border-bottom:1px solid var(--e-border); display:flex; align-items:center; justify-content:space-between; }
.ed-sec-add { background:rgba(93,186,126,0.2); border:1px solid rgba(93,186,126,0.4); color:var(--e-success); border-radius:6px; padding:3px 10px; font-size:9px; font-weight:800; letter-spacing:1px; cursor:pointer; font-family:'Montserrat',sans-serif; transition:all .15s; text-transform:uppercase; }
.ed-sec-add:hover { background:rgba(93,186,126,0.35); }

/* Store row in editor */
.store-row { background:var(--e-card); border:1px solid var(--e-border); border-radius:10px; padding:12px 12px 10px; margin-bottom:8px; transition:border-color .15s; }
.store-row:hover { border-color:rgba(201,168,76,0.35); }
.store-row-top { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.row-ic { font-size:20px; background:rgba(255,255,255,0.08); width:36px; height:36px; border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0; cursor:pointer; border:1px solid transparent; transition:border-color .15s; }
.row-ic:hover { border-color:rgba(201,168,76,0.5); }
.row-name-unit { flex:1; min-width:0; }
.store-row-actions { display:flex; gap:4px; flex-shrink:0; }

/* Inputs */
input[type=text], input[type=url], select, textarea {
  width:100%; background:var(--e-input); border:1px solid var(--e-border); border-radius:7px;
  color:var(--e-text); font-family:'Montserrat',sans-serif; font-size:11px; padding:7px 10px;
  outline:none; transition:border-color .15s;
}
input[type=text]:focus, select:focus, textarea:focus { border-color:rgba(201,168,76,0.55); }
select option { background:#1a2530; }
textarea { resize:vertical; min-height:52px; line-height:1.5; }
.inp-sm { font-size:10px; padding:5px 8px; }
.inp-label { font-size:9px; color:var(--e-dim); letter-spacing:0.5px; font-weight:600; margin-bottom:3px; text-transform:uppercase; }

/* Row of inputs */
.inp-grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.inp-grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; }

/* Badge selector */
.badge-sel { display:flex; gap:5px; }
.badge-opt { padding:4px 10px; border-radius:20px; font-size:9px; font-weight:800; letter-spacing:0.5px; cursor:pointer; border:1px solid transparent; transition:all .15s; font-family:'Montserrat',sans-serif; text-transform:uppercase; }
.badge-opt.none  { background:rgba(255,255,255,0.06); color:var(--e-dim); border-color:var(--e-border); }
.badge-opt.none.sel  { background:rgba(255,255,255,0.14); color:var(--e-text); border-color:rgba(255,255,255,0.3); }
.badge-opt.food  { background:rgba(201,168,76,0.12); color:var(--e-gold); border-color:rgba(201,168,76,0.3); }
.badge-opt.food.sel  { background:rgba(201,168,76,0.28); border-color:var(--e-gold); }
.badge-opt.new   { background:rgba(93,186,126,0.12); color:var(--e-success); border-color:rgba(93,186,126,0.3); }
.badge-opt.new.sel   { background:rgba(93,186,126,0.28); border-color:var(--e-success); }
.badge-opt.anchor{ background:rgba(201,168,76,0.12); color:var(--e-gold); border-color:rgba(201,168,76,0.3); }
.badge-opt.anchor.sel{ background:rgba(201,168,76,0.28); border-color:var(--e-gold); }

/* Action buttons */
.btn-del { background:rgba(224,82,82,0.15); border:1px solid rgba(224,82,82,0.3); color:var(--e-danger); border-radius:6px; padding:5px 10px; font-size:10px; font-weight:700; cursor:pointer; font-family:'Montserrat',sans-serif; transition:all .15s; }
.btn-del:hover { background:rgba(224,82,82,0.3); }
.btn-move { background:rgba(255,255,255,0.07); border:1px solid var(--e-border); color:var(--e-dim); border-radius:6px; padding:5px 8px; font-size:11px; cursor:pointer; font-family:'Montserrat',sans-serif; transition:all .15s; }
.btn-move:hover { background:rgba(255,255,255,0.15); }
.btn-expand { background:rgba(255,255,255,0.07); border:1px solid var(--e-border); color:var(--e-dim); border-radius:6px; padding:5px 8px; font-size:10px; font-weight:700; cursor:pointer; font-family:'Montserrat',sans-serif; transition:all .15s; }
.btn-expand:hover { background:rgba(255,255,255,0.14); }
.btn-expand.open { color:var(--e-gold); border-color:rgba(201,168,76,0.4); }

/* Expandable extra fields */
.extra-fields { display:none; margin-top:8px; border-top:1px solid var(--e-border); padding-top:8px; }
.extra-fields.open { display:block; }

/* Emoji picker strip */
.emoji-strip { display:flex; gap:4px; flex-wrap:wrap; margin-top:4px; }
.ep { font-size:18px; cursor:pointer; padding:3px 5px; border-radius:5px; transition:background .12s; }
.ep:hover { background:rgba(255,255,255,0.15); }

/* Toast */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:#1a2530; border:1px solid rgba(201,168,76,0.5); color:var(--e-gold); border-radius:10px; padding:10px 22px; font-size:11px; font-weight:700; letter-spacing:0.5px; opacity:0; transition:all .3s; z-index:9999; pointer-events:none; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* Floor description editor */
.desc-editor { background:var(--e-card); border:1px solid var(--e-border); border-radius:10px; padding:12px; margin-bottom:10px; }
.desc-row { margin-bottom:8px; }
.desc-row:last-child { margin-bottom:0; }

/* Category manager */
.cat-pill-edit { display:inline-flex; align-items:center; gap:5px; background:rgba(255,255,255,0.08); border:1px solid var(--e-border); border-radius:20px; padding:4px 10px; font-size:10px; font-weight:700; color:var(--e-dim); margin:3px; cursor:default; }
.cat-pill-edit .del-cat { cursor:pointer; color:var(--e-danger); font-size:12px; line-height:1; }

/* ══════════════════════════════
   RIGHT — KIOSK PREVIEW
══════════════════════════════ */
.preview { display:flex; align-items:center; justify-content:center; background:#0a1018; position:relative; overflow:hidden; }
.preview-label { position:absolute; top:12px; left:50%; transform:translateX(-50%); font-size:9px; font-weight:700; color:rgba(255,255,255,0.25); letter-spacing:2px; text-transform:uppercase; z-index:10; white-space:nowrap; }
iframe#livePreview { border:none; border-radius:8px; box-shadow:0 0 60px rgba(0,0,0,0.7); }

/* ══════════════════════════════
   KIOSK STYLES (injected into iframe)
══════════════════════════════ */
</style>
</head>

/* ════════════════════════════════
   EDITOR RENDER
════════════════════════════════ */
function renderEdFloorTabs() {
  document.getElementById('edFloorTabs').innerHTML = Object.keys(DATA).map(k =>
    `<div class="ed-ftab${k===edFloor?' active':''}" onclick="setEdFloor('${k}')">${k}</div>`
  ).join('');
}

function setEdFloor(f) { edFloor = f; renderEdFloorTabs(); renderEdBody(); }

function renderEdBody() {
  const fl = DATA[edFloor];
  let h = '';

  // Floor info section
  h += `<div class="ed-sec">Floor Info</div>
  <div class="desc-editor">
    <div class="desc-row">
      <div class="inp-label">Description shown under floor tab</div>
      <input type="text" value="${fl.desc}" oninput="DATA['${edFloor}'].desc=this.value;refreshPreview()" placeholder="Floor description…">
    </div>
    <div class="desc-row">
      <div class="inp-label">Opening hours</div>
      <input type="text" value="${fl.hours}" oninput="DATA['${edFloor}'].hours=this.value;refreshPreview()" placeholder="e.g. Mon–Sat 09:00–18:00…">
    </div>
  </div>`;

  // Categories + stores
  Object.entries(fl.cats).forEach(([cat, stores]) => {
    h += `<div class="ed-sec">${cat}
      <button class="ed-sec-add" onclick="addStore('${cat}')">+ Add Store</button>
    </div>`;
    stores.forEach((s, idx) => {
      h += storeRowHTML(cat, idx, s);
    });
  });

  // Add new category
  h += `<div class="ed-sec">Categories
    <button class="ed-sec-add" onclick="addCategory()">+ Add Category</button>
  </div>
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;">
    ${Object.keys(fl.cats).map(c =>
      `<span class="cat-pill-edit">${c}<span class="del-cat" onclick="deleteCategory('${c}')">✕</span></span>`
    ).join('')}
  </div>`;

  document.getElementById('edBody').innerHTML = h;
}

function storeRowHTML(cat, idx, s) {
  const id = `sr_${cat.replace(/\W/g,'_')}_${idx}`;
  return `<div class="store-row" id="${id}">
    <div class="store-row-top">
      <div class="row-ic" onclick="toggleEmojiPicker('${id}')" title="Click to change icon">${s.ic||'🏪'}</div>
      <div class="row-name-unit" style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
        <div>
          <div class="inp-label">Store name</div>
          <input type="text" class="inp-sm" value="${s.n}" oninput="updateStore('${cat}',${idx},'n',this.value)">
        </div>
        <div>
          <div class="inp-label">Unit / location</div>
          <input type="text" class="inp-sm" value="${s.u}" oninput="updateStore('${cat}',${idx},'u',this.value)">
        </div>
      </div>
      <div class="store-row-actions">
        <button class="btn-expand" id="exp_${id}" onclick="toggleExtra('${id}')">+ More</button>
        <button class="btn-del" onclick="deleteStore('${cat}',${idx})">✕</button>
      </div>
    </div>
    <!-- Emoji picker strip (hidden by default) -->
    <div id="ep_${id}" style="display:none;margin-bottom:6px;">
      <div class="inp-label">Choose icon</div>
      <div class="emoji-strip">
        ${EMOJIS.map(e => `<span class="ep" onclick="setIcon('${cat}',${idx},'${e}','${id}')">${e}</span>`).join('')}
      </div>
    </div>
    <!-- Extra fields -->

      <div class="inp-grid-2" style="margin-bottom:8px;">
        <div>
          <div class="inp-label">Colour (hex)</div>
          <input type="text" class="inp-sm" value="${s.c||'#4a6480'}" oninput="updateStore('${cat}',${idx},'c',this.value)" placeholder="#293945">
        </div>
        <div>
          <div class="inp-label">Badge</div>
          <div class="badge-sel">
            ${['none','food','new','anchor'].map(b =>
              `<span class="badge-opt ${b}${(!s.b&&b==='none')||(s.b===b)?' sel':''}" onclick="setBadge('${cat}',${idx},'${b}','${id}')">${b}</span>`
            ).join('')}
          </div>
        </div>
      </div>
      <div style="margin-bottom:8px;">
        <div class="inp-label">Description (shown in detail panel)</div>
        <textarea class="inp-sm" oninput="updateStore('${cat}',${idx},'desc',this.value)" placeholder="Short description of the store…">${s.desc||''}</textarea>
      </div>
      <div>
        <div class="inp-label">Opening hours (optional override)</div>
        <input type="text" class="inp-sm" value="${s.hours||''}" oninput="updateStore('${cat}',${idx},'hours',this.value)" placeholder="e.g. Mon–Sat 09:00–18:00">
      </div>
    </div>
  </div>`;
}

/* ════════════════════════════════
   EDITOR ACTIONS
════════════════════════════════ */
function updateStore(cat, idx, field, val) {
  DATA[edFloor].cats[cat][idx][field] = val;
  refreshPreview();
}

function deleteStore(cat, idx) {
  DATA[edFloor].cats[cat].splice(idx, 1);
  renderEdBody(); refreshPreview();
  toast('Store removed');
}

function addStore(cat) {
  DATA[edFloor].cats[cat].push({n:'New Store',u:'Unit —',ic:'🏪',c:'#4a6480',desc:''});
  renderEdBody(); refreshPreview();
  toast('Store added — edit the details below');
  // scroll to bottom
  setTimeout(()=>{ document.getElementById('edBody').scrollTop = 99999; }, 100);
}

function addCategory() {
  const name = prompt('New category name:');
  if (!name || !name.trim()) return;
  if (DATA[edFloor].cats[name]) { toast('Category already exists'); return; }
  DATA[edFloor].cats[name] = [];
  renderEdBody(); refreshPreview();
  toast(`Category "${name}" added`);
}

function deleteCategory(cat) {
  if (!confirm(`Delete category "${cat}" and all its stores?`)) return;
  delete DATA[edFloor].cats[cat];
  renderEdBody(); refreshPreview();
  toast(`Category "${cat}" deleted`);
}

function setIcon(cat, idx, emoji, id) {
  DATA[edFloor].cats[cat][idx].ic = emoji;
  document.querySelector(`#${id} .row-ic`).textContent = emoji;
  document.getElementById(`ep_${id}`).style.display = 'none';
  refreshPreview();
}

function toggleEmojiPicker(id) {
  const ep = document.getElementById(`ep_${id}`);
  ep.style.display = ep.style.display==='none' ? 'block' : 'none';
}

function toggleExtra(id) {
  const ex = document.getElementById(`extra_${id}`);
  const btn = document.getElementById(`exp_${id}`);
  const open = ex.classList.toggle('open');
  btn.classList.toggle('open', open);
  btn.textContent = open ? '– Less' : '+ More';
}

function setBadge(cat, idx, badge, id) {
  DATA[edFloor].cats[cat][idx].b = badge==='none' ? undefined : badge;
  // Update UI
  const row = document.getElementById(id);
  row.querySelectorAll('.badge-opt').forEach(el => {
    el.classList.toggle('sel', el.classList.contains(badge));
  });
  refreshPreview();
}

/* ════════════════════════════════
   LIVE PREVIEW (iframe)
════════════════════════════════ */
function refreshPreview() {
  const iframe = document.getElementById('livePreview');
  const doc = iframe.contentDocument || iframe.contentWindow.document;
  // Re-inject data and call re-render
  try {
    iframe.contentWindow.DATA = JSON.parse(JSON.stringify(DATA));
    iframe.contentWindow.renderAll();
  } catch(e) {
    // If iframe not ready, do full reload
    buildPreview();
  }
}

function buildPreview() {
  const iframe = document.getElementById('livePreview');
  iframe.srcdoc = generateKioskHTML(true);
  iframe.onload = () => {
    try {
      iframe.contentWindow.DATA = JSON.parse(JSON.stringify(DATA));
      iframe.contentWindow.renderAll();
    } catch(e) {}
  };
}

function sizePreview() {
  const iframe = document.getElementById('livePreview');
  const container = iframe.parentElement;
  const maxH = container.clientHeight - 40;
  const maxW = container.clientWidth - 40;
  const h = Math.min(maxH, maxW * 16/9);
  const w = h * 9/16;
  iframe.style.width  = w + 'px';
  iframe.style.height = h + 'px';
  iframe.style.transform = 'none';
}

.det-close{position:absolute;top:3.5%;right:4%;background:rgba(255,255,255,0.1);border:none;color:var(--white);width:clamp(36px,5vw,56px);height:clamp(36px,5vw,56px);border-radius:50%;font-size:clamp(12px,1.6vw,20px);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Montserrat',sans-serif;transition:background .15s;}
.det-close:hover{background:rgba(255,255,255,0.2);}
.det-ic-wrap{width:clamp(50px,8vw,80px);height:clamp(50px,8vw,80px);border-radius:var(--r-lg);display:flex;align-items:center;justify-content:center;font-size:clamp(22px,3.5vw,40px);margin-bottom:3%;}
.det-name{font-size:clamp(16px,2.2vw,30px);font-weight:900;color:var(--white);margin-bottom:1%;}
.det-floor{font-size:clamp(7px,0.9vw,12px);color:var(--gold);letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:3%;}
.det-rows{display:grid;gap:1.5%;}
.det-row{display:flex;align-items:flex-start;gap:3%;background:rgba(255,255,255,0.05);border-radius:var(--r-sm);padding:2.8% 3%;}
.det-row-ic{font-size:clamp(14px,1.8vw,22px);flex-shrink:0;width:1.4em;text-align:center;margin-top:2px;}
.det-row-tx{font-size:clamp(8px,1.05vw,14px);color:var(--dim);line-height:1.5;}
.det-row-tx strong{color:var(--white);font-weight:700;display:block;margin-bottom:2px;}
.footer{background:rgba(0,0,0,0.32);border-top:1px solid rgba(201,168,76,0.18);padding:1.8% 4.5%;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
.yah-btn{background:var(--gold);color:var(--brand-dk);border:none;border-radius:30px;padding:1.5% 4%;font-size:clamp(7px,0.95vw,13px);font-weight:900;letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-family:'Montserrat',sans-serif;transition:background .15s;}
.yah-btn:hover{background:var(--gold-lt);}
.wifi-row{display:flex;align-items:center;gap:5%;margin-left:3%;}
.wifi-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;animation:pulse 2.2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.wifi-txt{font-size:clamp(6px,0.82vw,11px);color:var(--green);font-weight:700;letter-spacing:0.5px;}
.ftr-r{font-size:clamp(5.5px,0.75vw,10px);color:var(--muted);text-align:right;line-height:1.6;}
</style>
</head>
<body>
<div id="kiosk">
  <div class="hdr">
    <div class="hdr-top">
      <div><div class="logo">Foyleside</div><div class="logo-sub">Shopping Centre · Derry</div></div>
      <div class="hdr-right"><div id="clock">--:--</div><div id="dateline"></div></div>
    </div>
    <div class="search-wrap">
      <span class="search-ic">⌕</span>
      <input id="searchInput" type="text" autocomplete="off" spellcheck="false" placeholder="Search stores, restaurants, services…">
      <button id="searchClear" onclick="clearSearch()">✕</button>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="view-sw">
    <div class="vbtn active" id="vbtn-stores" onclick="setView('stores')">🏪 &nbsp;Stores</div>
    <div class="vbtn" id="vbtn-map" onclick="setView('map')">🗺 &nbsp;Floor Map</div>
  </div>
  <div class="pills-wrap" id="pillsWrap"></div>
  <div class="main" id="main"></div>
  <div class="footer">
    <div style="display:flex;align-items:center;">
      <button class="yah-btn" onclick="setView('map')">📍 You are here</button>
      <div class="wifi-row"><div class="wifi-dot"></div><span class="wifi-txt">Free WiFi</span></div>
    </div>
    <div class="ftr-r">Touch screen to explore<br>19 Orchard Street, Derry BT48 6XY</div>
  </div>
  <div id="overlay" onclick="if(event.target===this)closeDetail()">
    <div class="det-panel">
      <button class="det-close" onclick="closeDetail()">✕</button>
      <div class="det-handle"></div>
      <div id="detContent"></div>
    </div>
  </div>
</div>
<script>
var DATA = ${dataStr};
var AF='L2',AC='All',AV='stores',SQ='';
function tick(){var n=new Date(),p=x=>String(x).padStart(2,'0');document.getElementById('clock').textContent=p(n.getHours())+':'+p(n.getMinutes());var dy=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'],mo=['January','February','March','April','May','June','July','August','September','October','November','December'];document.getElementById('dateline').textContent=dy[n.getDay()]+' '+n.getDate()+' '+mo[n.getMonth()]+' '+n.getFullYear();}
tick();setInterval(tick,15000);
function renderAll(){renderTabs();renderPills();renderMain();}
function renderTabs(){document.getElementById('tabs').innerHTML=Object.keys(DATA).map(k=>'<div class="tab'+(k===AF?' active':'')+'" onclick="setFloor(\''+k+'\')">'+'<span class="tab-num">'+k+'</span><span class="tab-lbl">'+DATA[k].label+'</span></div>').join('');}
function renderPills(){if(SQ){document.getElementById('pillsWrap').innerHTML='';return;}var cats=Object.keys(DATA[AF].cats);document.getElementById('pillsWrap').innerHTML='<div class="pill'+(AC==='All'?' active':'')+'" onclick="setCat(\'All\')">All</div>'+cats.map(c=>'<div class="pill'+(AC===c?' active':'')+'" onclick="setCat(\''+c+'\')">'+c+'</div>').join('');}
function sCard(s,fk,showFloor){var enc=encodeURIComponent(JSON.stringify(s));return '<div class="s-card" onclick="openDetail(\''+enc+'\',\''+(fk||AF)+'\')"><div class="s-ic" style="background:'+s.c+'22;color:'+s.c+'">'+(s.ic||'🏪')+'</div><div class="s-info"><div class="s-name">'+s.n+'</div><div class="s-unit">'+s.u+(showFloor?'<span class="sr-badge">'+fk+'</span>':'')+'</div>'+(s.b?'<span class="badge b-'+s.b+'">'+(s.b==='anchor'?'Anchor':s.b==='new'?'New':'Dining')+'</span>':'')+'</div></div>';}
function renderMain(){if(SQ){renderSearch();return;}if(AV==='map'){renderMapView();return;}var fl=DATA[AF],cats=Object.keys(fl.cats),showCats=AC==='All'?cats:[AC],h='';h+='<div class="flr-desc">'+fl.desc+'</div>';h+='<div class="hours-strip">🕐 &nbsp;<strong>Centre hours today:&nbsp;</strong>'+fl.hours+'</div>';if(fl.anchors&&fl.anchors.length&&AC==='All'){h+='<div class="sec-lbl">Anchor stores</div><div class="anchors">';fl.anchors.forEach(a=>{h+='<div class="anc-card" onclick="openStoreByName(\''+a+'\')"><div class="anc-name">'+a+'</div><div class="anc-tag">Anchor</div></div>';});h+='</div>';}showCats.forEach(cat=>{h+='<div class="sec-lbl">'+cat+'</div><div class="store-grid">';fl.cats[cat].forEach(s=>{h+=sCard(s,AF,false);});h+='</div>';});if(AC==='All'&&fl.toilets){h+='<div class="toilet-block"><div class="toilet-ttl">'+fl.toilets.title+'</div><div class="toilet-items">'+fl.toilets.items.map(i=>'<div class="toilet-item">'+i+'</div>').join('')+'</div></div>';}if(AC==='All'){h+='<div class="sec-lbl" style="margin-top:3%">Centre facilities</div><div class="facs"><div class="fac"><span class="fac-ic">🚻</span><span class="fac-n">Toilets</span></div><div class="fac"><span class="fac-ic">♿</span><span class="fac-n">Accessibility</span></div><div class="fac"><span class="fac-ic">🅿</span><span class="fac-n">Car Park</span></div><div class="fac"><span class="fac-ic">🏧</span><span class="fac-n">ATM</span></div><div class="fac"><span class="fac-ic">🎁</span><span class="fac-n">Gift Cards</span></div><div class="fac"><span class="fac-ic">📦</span><span class="fac-n">Click &amp; Collect</span></div><div class="fac"><span class="fac-ic">ℹ️</span><span class="fac-n">Info Desk</span></div><div class="fac"><span class="fac-ic">🚗</span><span class="fac-n">Car Valet</span></div></div>';}document.getElementById('main').innerHTML=h;}
function renderMapView(){var fl=DATA[AF];document.getElementById('main').innerHTML='<div style="text-align:center;padding:10% 5%;color:var(--dim);"><div style="font-size:3em;margin-bottom:4%">🗺</div><div style="font-size:clamp(10px,1.3vw,18px);font-weight:700;color:var(--white);margin-bottom:2%">'+fl.label+' Floor Map</div><div style="font-size:clamp(8px,1vw,14px)">Floor maps are displayed when loaded<br>on the kiosk screen.</div></div>';}
function renderSearch(){var q=SQ.toLowerCase(),results=[];Object.entries(DATA).forEach(([fk,fv])=>{Object.values(fv.cats).flat().forEach(s=>{if(s.n.toLowerCase().includes(q)||(s.desc&&s.desc.toLowerCase().includes(q))||(s.u&&s.u.toLowerCase().includes(q))){results.push({...s,_fk:fk});}});});var h='<div class="sr-head">'+results.length+' result'+(results.length!==1?'s':'')+' for "'+SQ+'"</div>';if(!results.length){h+='<div class="no-results"><span class="nr-ic">🔍</span>No stores found for "'+SQ+'".<br>Try a different search term.</div>';}else{h+='<div class="store-grid">';results.forEach(s=>{h+=sCard(s,s._fk,true);});h+='</div>';}document.getElementById('main').innerHTML=h;}
function clearSearch(){SQ='';document.getElementById('searchInput').value='';document.getElementById('searchClear').classList.remove('show');renderPills();renderMain();}
document.getElementById('searchInput').addEventListener('input',function(){SQ=this.value.trim();document.getElementById('searchClear').classList.toggle('show',!!SQ);renderPills();renderMain();document.getElementById('main').scrollTop=0;});
function openDetail(enc,fk){var s=JSON.parse(decodeURIComponent(enc)),fl=DATA[fk];document.getElementById('detContent').innerHTML='<div class="det-ic-wrap" style="background:'+s.c+'22;color:'+s.c+'">'+(s.ic||'🏪')+'</div><div class="det-name">'+s.n+'</div><div class="det-floor">'+(fl?fl.label:fk)+' &nbsp;·&nbsp; '+s.u+'</div><div class="det-rows">'+(s.desc?'<div class="det-row"><span class="det-row-ic">📝</span><span class="det-row-tx">'+s.desc+'</span></div>':'')+'<div class="det-row"><span class="det-row-ic">🕐</span><span class="det-row-tx"><strong>Opening hours</strong>'+(s.hours||fl&&fl.hours||'See centre hours')+'</span></div><div class="det-row"><span class="det-row-ic">📍</span><span class="det-row-tx"><strong>Location</strong>'+(fl?fl.label:fk)+' — '+s.u+'</span></div>'+(s.b==='food'?'<div class="det-row"><span class="det-row-ic">🍽</span><span class="det-row-tx">Dining venue</span></div>':'')+(s.b==='new'?'<div class="det-row"><span class="det-row-ic">🆕</span><span class="det-row-tx">Recently opened at Foyleside</span></div>':'')+'</div>';document.getElementById('overlay').classList.add('open');}
function openStoreByName(name){var found=null,fk=null;Object.entries(DATA).forEach(([k,f])=>{Object.values(f.cats).flat().forEach(s=>{if(s.n===name){found=s;fk=k;}});});if(found)openDetail(encodeURIComponent(JSON.stringify(found)),fk);}
function closeDetail(){document.getElementById('overlay').classList.remove('open');}
function setView(v){AV=v;document.getElementById('vbtn-stores').classList.toggle('active',v==='stores');document.getElementById('vbtn-map').classList.toggle('active',v==='map');document.getElementById('pillsWrap').style.display=v==='map'?'none':'flex';renderMain();}
function setFloor(f){AF=f;AC='All';renderTabs();renderPills();renderMain();document.getElementById('main').scrollTop=0;}
function setCat(c){AC=c;renderPills();renderMain();document.getElementById('main').scrollTop=0;}
var idleT;function resetIdle(){clearTimeout(idleT);idleT=setTimeout(()=>{clearSearch();setFloor('L2');setView('stores');closeDetail();},180000);}
document.getElementById('kiosk').addEventListener('touchstart',resetIdle,{passive:true});
document.getElementById('kiosk').addEventListener('mousedown',resetIdle);
resetIdle();renderAll();
<\/script>
</body>
</html>`;
}

/* ════════════════════════════════
   EXPORT
════════════════════════════════ */
function exportKiosk() {
  const html = generateKioskHTML(false);
  const blob = new Blob([html], {type:'text/html'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'foyleside_kiosk_EXPORT.html';
  a.click(); URL.revokeObjectURL(url);
  toast('✅ Kiosk file exported!');
}

/* ════════════════════════════════
   TOAST
════════════════════════════════ */
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 2800);
}

/* ════════════════════════════════
   INIT
════════════════════════════════ */
window.addEventListener('resize', ()=>{ sizePreview(); });
renderEdFloorTabs();
renderEdBody();
buildPreview();
setTimeout(sizePreview, 200);
</script>
</body>
</html>
